version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: afia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-afia_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_env}
      POSTGRES_DB: ${POSTGRES_DB:-afia_health}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-afia_admin} -d ${POSTGRES_DB:-afia_health}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - afia_network

  redis:
    image: redis:7-alpine
    container_name: afia_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_in_env}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - afia_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: afia_qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-change_me_in_env}
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    networks:
      - afia_network

  minio:
    image: minio/minio:latest
    container_name: afia_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-afia_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_in_env}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - afia_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: afia_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-afia_admin}:${POSTGRES_PASSWORD:-change_me_in_env}@postgres:5432/${POSTGRES_DB:-afia_health}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_in_env}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-change_me_in_env}
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-afia_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_in_env}
      SECRET_KEY: ${SECRET_KEY:-generate_a_32_byte_random_string}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-generate_a_32_byte_random_string}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,https://afia.health,https://app.afia.health}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./backend/static:/app/static
      - ./knowledge-base:/app/knowledge-base
    networks:
      - afia_network

  # nginx:
  #   image: nginx:alpine
  #   container_name: afia_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./docker/nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - api
  #   networks:
  #     - afia_network

  backup:
    image: offen/docker-volume-backup:latest
    container_name: afia_backup
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "0 2 * * *"
      BACKUP_RETENTION_DAYS: "30"
      BACKUP_FILENAME: afia-backup-%Y-%m-%dT%H-%M-%S.tar.gz
      AWS_S3_BUCKET_NAME: ${BACKUP_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${BACKUP_AWS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_AWS_SECRET:-}
      AWS_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-s3.amazonaws.com}
      BACKUP_ARCHIVE: /backup
      BACKUP_FROM_SNAPSHOT: "true"
    volumes:
      - postgres_data:/backup/postgres:ro
      - qdrant_data:/backup/qdrant:ro
      - minio_data:/backup/minio:ro
      - ./backups:/archive
    networks:
      - afia_network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:

networks:
  afia_network:
    driver: bridge
